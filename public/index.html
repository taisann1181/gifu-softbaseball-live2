<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>県岐商 vs 中京 速報</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">高校軟式野球 LIVE</p>
      <h1>第74回岐阜県高等学校総合体育大会 軟式野球競技</h1>
      <p class="sub">2026.05.16(土) 夜明け前🏟️ / 準決勝 第2試合　県岐商 vs 中京</p>
    </div>
    <div class="liveBadge">
      <span class="dot"></span>
      LIVE
    </div>
  </header>

  <main class="container">
    <section class="scoreCard">
      <div class="scoreMeta">
        <span id="gameStatus">読み込み中</span>
        <span id="updatedAt">--</span>
      </div>

      <div class="scoreBoard">
        <div class="teamRow">
          <div class="teamName">県岐商</div>
          <div id="awayScore" class="totalScore">-</div>
        </div>
        <div class="teamRow">
          <div class="teamName">中京</div>
          <div id="homeScore" class="totalScore">-</div>
        </div>
      </div>
    </section>

    <section class="feedHeader">
      <h2>試合経過</h2>
      <p>GitHub Issueコメントを読み込んで速報風に表示します。</p>
    </section>

    <section id="feed" class="feed"></section>

    <section id="empty" class="empty" hidden>
      まだ速報コメントがありません。
    </section>
  </main>

  <footer class="footer">
    非公式速報ページです。内容は入力されたコメントに基づきます。
  </footer>

  <script src="./app.js"></script>
</body>
</html>
