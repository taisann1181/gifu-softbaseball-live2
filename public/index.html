<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>高校軟式野球 速報</title>
  <link rel="stylesheet" href="./style.css">

  <style>
    .gameMiniSelector {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 10px 0 14px;
      padding: 7px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      box-shadow: 0 4px 12px rgba(15, 35, 60, 0.06);
      width: fit-content;
      max-width: 100%;
    }

    .gameMiniSelector span {
      font-size: 12px;
      font-weight: 900;
      color: var(--muted);
      white-space: nowrap;
    }

    .gameMiniSelector input {
      width: 58px;
      min-width: 58px;
      padding: 5px 6px;
      border-radius: 999px;
      text-align: center;
      font-weight: 900;
      font-size: 14px;
    }

    .gameMiniSelector button {
      border: 0;
      border-radius: 999px;
      padding: 6px 9px;
      background: #eef3f8;
      color: var(--primary);
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
    }

    .gameMiniSelector .currentGameLabel {
      color: var(--primary);
    }

    @media (max-width: 640px) {
      .gameMiniSelector {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">高校軟式野球 LIVE</p>
      <h1 id="matchTitle">試合速報</h1>
      <p id="matchSub" class="sub">読み込み中...</p>
    </div>
  </header>

  <main class="container">
    <div class="gameMiniSelector">
      <span>試合番号</span>
      <input id="viewGameNumber" type="number" min="1" inputmode="numeric" placeholder="1">
      <span id="currentGameLabel" class="currentGameLabel">最新</span>
      <button type="button" onclick="loadCurrentGame()">最新</button>
    </div>

    <section class="scoreCard">
      <div class="scoreMeta">
        <span id="gameStatus">読み込み中</span>
        <span id="updatedAt">--</span>
      </div>

      <div id="lineScoreWrap" class="lineScoreWrap"></div>
    </section>

    <section class="panel">
      <div class="panelHead">
        <h2>スタメン</h2>
      </div>

      <div class="lineupGrid">
        <div>
          <h3 id="awayLineupTitle">先攻</h3>
          <ol id="awayLineup" class="lineupList"></ol>
        </div>
        <div>
          <h3 id="homeLineupTitle">後攻</h3>
          <ol id="homeLineup" class="lineupList"></ol>
        </div>
      </div>
    </section>

    <section class="feedHeader">
      <h2>試合経過</h2>
      <p>Issueコメントから生成した試合データを表示しています。</p>
    </section>

    <section id="feed" class="feed"></section>

    <section id="empty" class="empty" hidden>
      まだ速報コメントがありません。
    </section>
  </main>

  <footer class="footer">
    非公式速報ページです。内容は入力されたコメントに基づきます。
  </footer>

  <script src="./app.js"></script>
</body>
</html>
