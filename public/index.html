<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>高校軟式野球 1球速報</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">高校軟式野球 LIVE</p>
      <h1 id="matchTitle">1球速報</h1>
      <p id="matchSub" class="sub">読み込み中...</p>
    </div>
  </header>

  <main class="container">
    <div class="gameMiniSelector">
      <span>試合番号</span>
      <input id="viewGameNumber" type="number" min="1" inputmode="numeric" placeholder="1">
      <span id="currentGameLabel" class="currentGameLabel">最新</span>
      <button type="button" onclick="loadCurrentGame()">最新</button>
    </div>

    <section class="scoreCard">
      <div class="scoreMeta">
        <span id="gameStatus">読み込み中</span>
        <span id="updatedAt">--</span>
      </div>

      <div id="lineScoreWrap" class="lineScoreWrap"></div>
    </section>

    <section class="livePanel">
      <div class="livePanelHead">
        <div>
          <p id="currentInning" class="liveInning">--</p>
          <h2 id="currentAttack">現在の攻撃</h2>
        </div>
        <div class="countBox">
          <div><span>B</span><strong id="ballCount">0</strong></div>
          <div><span>S</span><strong id="strikeCount">0</strong></div>
          <div><span>O</span><strong id="outCount">0</strong></div>
        </div>
      </div>

      <div class="matchupGrid">
        <div>
          <p>打者</p>
          <strong id="currentBatter">--</strong>
        </div>
        <div>
          <p>投手</p>
          <strong id="currentPitcher">--</strong>
        </div>
        <div>
          <p>走者</p>
          <strong id="currentBases">なし</strong>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="panelHead">
        <h2>スタメン</h2>
      </div>

      <div class="lineupGrid">
        <div>
          <h3 id="awayLineupTitle">先攻</h3>
          <ol id="awayLineup" class="lineupList"></ol>
        </div>
        <div>
          <h3 id="homeLineupTitle">後攻</h3>
          <ol id="homeLineup" class="lineupList"></ol>
        </div>
      </div>
    </section>

    <section class="feedHeader">
      <h2>1球速報</h2>
      <p>打席ごとの球歴と結果を表示します。</p>
    </section>

    <section id="feed" class="feed"></section>

    <section id="empty" class="empty" hidden>
      まだ速報データがありません。
    </section>
  </main>

  <footer class="footer">
    非公式速報ページです。
  </footer>

  <script src="./app.js"></script>
</body>
      </html>
