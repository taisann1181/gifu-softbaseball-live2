<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>速報編集ページ</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">LIVE EDITOR</p>
      <h1>速報編集ページ</h1>
      <p class="sub">入力内容をJSON化して、Issueコメントに貼り付けます。</p>
    </div>
    <a class="editLink" href="./index.html">閲覧ページ</a>
  </header>

  <main class="container">
    <section class="panel">
      <h2>大会・試合情報</h2>

      <div class="formGrid">
        <label>大会名<input id="matchTitle" value="第74回岐阜県高等学校総合体育大会 軟式野球競技"></label>
        <label>日付<input id="matchDate" value="2026.05.16(土)"></label>
        <label>会場<input id="matchVenue" value="夜明け前🏟️"></label>
        <label>試合名<input id="matchRound" value="準決勝 第2試合"></label>
        <label>先攻チーム<input id="awayTeam" value="県岐商"></label>
        <label>後攻チーム<input id="homeTeam" value="中京"></label>
        <label>イニング数<input id="innings" type="number" value="7"></label>
      </div>

      <button class="button" onclick="makeMatchCommand()">試合情報JSONを作る</button>
    </section>

    <section class="panel">
      <h2>スタメン</h2>

      <label>チーム
        <select id="lineupTeam">
          <option value="away">先攻</option>
          <option value="home">後攻</option>
        </select>
      </label>

      <label>スタメン・ベンチ入りなど 1行ずつ
        <textarea id="lineupPlayers" rows="10" placeholder="1. 山田 6&#10;2. 佐藤 4&#10;3. 鈴木 1"></textarea>
      </label>

      <button class="button" onclick="makeLineupCommand()">スタメンJSONを作る</button>
    </section>

    <section class="panel">
      <h2>速報入力</h2>

      <div class="formGrid">
        <label>回<input id="eventInning" type="number" value="1"></label>
        <label>表/裏
          <select id="eventHalf">
            <option value="top">表</option>
            <option value="bottom">裏</option>
          </select>
        </label>
        <label>県岐商 得点<input id="awayRuns" type="number" value="0"></label>
        <label>中京 得点<input id="homeRuns" type="number" value="0"></label>
        <label>県岐商 安打<input id="awayHits" type="number" value="0"></label>
        <label>中京 安打<input id="homeHits" type="number" value="0"></label>
        <label>県岐商 失策<input id="awayErrors" type="number" value="0"></label>
        <label>中京 失策<input id="homeErrors" type="number" value="0"></label>
      </div>

      <label>本文
        <textarea id="eventText" rows="5" placeholder="1死二塁から中前適時打。中京が先制。"></textarea>
      </label>

      <button class="button" onclick="makeEventCommand()">速報JSONを作る</button>
      <button class="button secondary" onclick="makeFinalCommand()">試合終了JSONを作る</button>
    </section>

    <section class="panel">
      <h2>得点表を直接修正</h2>
      <p class="help">合計点が合わないときは、ここで得点表・H・Eを直接上書きできます。</p>

      <label>県岐商 得点表 カンマ区切り
        <input id="awayRunsByInning" value="0,0,0,0,0,0,0">
      </label>

      <label>中京 得点表 カンマ区切り
        <input id="homeRunsByInning" value="0,0,0,0,0,0,0">
      </label>

      <div class="formGrid">
        <label>県岐商 H<input id="scoreAwayHits" type="number" value="0"></label>
        <label>中京 H<input id="scoreHomeHits" type="number" value="0"></label>
        <label>県岐商 E<input id="scoreAwayErrors" type="number" value="0"></label>
        <label>中京 E<input id="scoreHomeErrors" type="number" value="0"></label>
        <label>状態<input id="scoreStatus" value="試合前"></label>
      </div>

      <button class="button" onclick="makeScoreboardCommand()">得点表修正JSONを作る</button>
    </section>

    <section class="panel">
      <h2>コピーしてIssueに貼る</h2>

      <textarea id="output" rows="12" readonly></textarea>

      <div class="buttonRow">
        <button class="button" onclick="copyOutput()">コピー</button>
        <a class="button secondary" href="https://github.com/taisann1181/gifu-softbaseball-live2/issues/1#issuecomment-new" target="_blank">
          Issueを開く
        </a>
      </div>
    </section>
  </main>

  <script>
    function n(id) {
      const value = Number(document.getElementById(id).value);
      return Number.isFinite(value) ? value : 0;
    }

    function v(id) {
      return document.getElementById(id).value;
    }

    function wrap(obj) {
      document.getElementById("output").value =
        "```livejson\n" + JSON.stringify(obj, null, 2) + "\n```";
    }

    function makeMatchCommand() {
      wrap({
        type: "match",
        title: v("matchTitle"),
        date: v("matchDate"),
        venue: v("matchVenue"),
        round: v("matchRound"),
        awayTeam: v("awayTeam"),
        homeTeam: v("homeTeam"),
        innings: n("innings")
      });
    }

    function makeLineupCommand() {
      const players = v("lineupPlayers")
        .split("\n")
        .map((x) => x.trim())
        .filter(Boolean);

      wrap({
        type: "lineup",
        team: v("lineupTeam"),
        players
      });
    }

    function makeEventCommand() {
      wrap({
        type: "event",
        inning: n("eventInning"),
        half: v("eventHalf"),
        awayRuns: n("awayRuns"),
        homeRuns: n("homeRuns"),
        awayHits: n("awayHits"),
        homeHits: n("homeHits"),
        awayErrors: n("awayErrors"),
        homeErrors: n("homeErrors"),
        text: v("eventText")
      });
    }

    function makeFinalCommand() {
      wrap({
        type: "final",
        inning: n("eventInning"),
        half: v("eventHalf"),
        text: v("eventText") || "試合終了"
      });
    }

    function parseArray(id) {
      return v(id)
        .split(",")
        .map((x) => Number(x.trim()) || 0);
    }

    function makeScoreboardCommand() {
      wrap({
        type: "scoreboard",
        awayRunsByInning: parseArray("awayRunsByInning"),
        homeRunsByInning: parseArray("homeRunsByInning"),
        awayHits: n("scoreAwayHits"),
        homeHits: n("scoreHomeHits"),
        awayErrors: n("scoreAwayErrors"),
        homeErrors: n("scoreHomeErrors"),
        status: v("scoreStatus")
      });
    }

    async function copyOutput() {
      const text = document.getElementById("output").value;
      await navigator.clipboard.writeText(text);
      alert("コピーしました");
    }
  </script>
</body>
</html>
