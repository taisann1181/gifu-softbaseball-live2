<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>速報編集ページ</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">LIVE EDITOR</p>
      <h1>速報編集ページ</h1>
      <p class="sub">大会情報 → スタメン → 速報入力 の順で進みます。</p>
    </div>

    <div class="buttonRow">
      <a class="editLink" href="./index.html">閲覧ページ</a>
      <button class="editLink" type="button" onclick="openNewGameIssue()">新しく試合をつくる</button>
    </div>
  </header>

  <main class="container">
    <section class="panel stepPanel" id="step1">
      <p class="stepLabel">STEP 1</p>
      <h2>大会・試合情報</h2>

      <div class="formGrid">
        <label>大会名
          <input id="matchTitle" placeholder="例：第74回岐阜県高等学校総合体育大会 軟式野球競技">
        </label>

        <label>日付
          <input id="matchDate" type="date">
        </label>

        <label>会場
          <input id="matchVenue" placeholder="例：中津川公園野球場">
        </label>

        <label>試合名
          <input id="matchRound" placeholder="例：準決勝 第2試合">
        </label>

        <label>先攻チーム
          <input id="awayTeam" placeholder="例：県岐商" oninput="syncTeamNames()">
        </label>

        <label>後攻チーム
          <input id="homeTeam" placeholder="例：中京" oninput="syncTeamNames()">
        </label>
      </div>

      <div class="buttonRow">
        <button class="button" onclick="makeMatchCommand()">大会・試合情報JSONを作る</button>
        <button class="button secondary" onclick="nextStep()">次へ進む / スキップ</button>
      </div>
    </section>

    <section class="panel stepPanel" id="step2" hidden>
      <p class="stepLabel">STEP 2</p>
      <h2>スタメン</h2>

      <label>チーム
        <select id="lineupTeam"></select>
      </label>

      <div id="lineupRows" class="lineupEditor"></div>

      <div id="pitcherRow" class="pitcherRow" hidden>
        <h3>P.</h3>

        <div class="lineupInputRow">
          <span>P.</span>
          <input id="pitcherName" placeholder="投手名">
          <select id="pitcherPosition" disabled>
            <option value="P">P</option>
          </select>
        </div>
      </div>

      <div class="buttonRow">
        <button class="button" onclick="makeLineupCommand()">スタメンJSONを作る</button>
        <button class="button secondary" onclick="nextStep()">次へ進む / スキップ</button>
      </div>
    </section>

    <section class="panel stepPanel" id="step3" hidden>
      <p class="stepLabel">STEP 3</p>
      <h2>速報入力</h2>

      <div class="formGrid">
        <label>回
          <select id="eventInning"></select>
        </label>

        <label>表/裏
          <select id="eventHalf" onchange="syncTeamNames(); syncEventFields();">
            <option value="top">表</option>
            <option value="bottom">裏</option>
          </select>
        </label>

        <label id="awayRunsBox"><span id="awayRunsLabel">先攻 得点</span>
          <select id="awayRuns"></select>
        </label>

        <label id="homeRunsBox"><span id="homeRunsLabel">後攻 得点</span>
          <select id="homeRuns"></select>
        </label>

        <label id="awayHitsBox"><span id="awayHitsLabel">先攻 安打</span>
          <select id="awayHits"></select>
        </label>

        <label id="homeHitsBox"><span id="homeHitsLabel">後攻 安打</span>
          <select id="homeHits"></select>
        </label>

        <label id="awayErrorsBox"><span id="awayErrorsLabel">先攻 失策</span>
          <select id="awayErrors"></select>
        </label>

        <label id="homeErrorsBox"><span id="homeErrorsLabel">後攻 失策</span>
          <select id="homeErrors"></select>
        </label>
      </div>

      <label class="checkLabel">
        <input id="finalCheck" type="checkbox">
        試合終了
      </label>

      <label>本文
        <textarea id="eventText" rows="5" placeholder="例：1死二塁から中前適時打。"></textarea>
      </label>

      <div class="buttonRow">
        <button class="button" onclick="makeEventCommand()">速報JSONを作る</button>
      </div>
    </section>

    <section class="panel">
      <h2>コピーしてIssueに貼る</h2>
      <p class="help">生成したJSONをコピーし、速報入力Issueのコメントに貼り付けます。</p>

      <textarea id="output" rows="12" readonly></textarea>

      <div class="buttonRow">
        <button class="button" onclick="copyOutput()">コピー</button>
        <button class="button secondary" onclick="openCurrentIssue()">現在のIssueを開く</button>
      </div>
    </section>
  </main>

  <script>
    const REPO_OWNER = "taisann1181";
    const REPO_NAME = "gifu-softbaseball-live2";

    let currentStep = 1;
    let currentIssueUrl = `https://github.com/${REPO_OWNER}/${REPO_NAME}/issues`;

    const positions = ["", "投", "捕", "一", "二", "三", "遊", "左", "中", "右", "D"];

    function el(id) {
      return document.getElementById(id);
    }

    function value(id) {
      return el(id).value;
    }

    function num(id) {
      return Number(value(id)) || 0;
    }

    function optionHtml(value, label = value) {
      return `<option value="${value}">${label}</option>`;
    }

    function fillNumberSelect(id, max) {
      el(id).innerHTML = Array.from({ length: max + 1 }, (_, i) => {
        return optionHtml(i, String(i));
      }).join("");
    }

    function fillInningSelect() {
      el("eventInning").innerHTML = Array.from({ length: 20 }, (_, i) => {
        const inning = i + 1;
        return optionHtml(inning, `${inning}回`);
      }).join("");
    }

    function fillLineupTeamSelect() {
      const away = value("awayTeam") || "先攻";
      const home = value("homeTeam") || "後攻";
      const current = value("lineupTeam") || "away";

      el("lineupTeam").innerHTML = `
        <option value="away">${away}</option>
        <option value="home">${home}</option>
      `;

      el("lineupTeam").value = current;
    }

    function positionSelectHtml(id) {
      return `
        <select id="${id}" onchange="checkDh()">
          ${positions.map((p) => optionHtml(p, p || "選択")).join("")}
        </select>
      `;
    }

    function buildLineupRows() {
      const rows = [];

      for (let i = 1; i <= 9; i++) {
        rows.push(`
          <div class="lineupInputRow">
            <span>${i}.</span>
            <input id="playerName${i}" placeholder="名前">
            ${positionSelectHtml(`playerPos${i}`)}
          </div>
        `);
      }

      el("lineupRows").innerHTML = rows.join("");
    }

    function checkDh() {
      const hasDh = Array.from({ length: 9 }, (_, i) => {
        return value(`playerPos${i + 1}`);
      }).some((pos) => pos === "D");

      el("pitcherRow").hidden = !hasDh;
    }

    function syncTeamNames() {
      const away = value("awayTeam") || "先攻";
      const home = value("homeTeam") || "後攻";

      fillLineupTeamSelect();

      el("awayRunsLabel").textContent = `${away} 得点`;
      el("homeRunsLabel").textContent = `${home} 得点`;
      el("awayHitsLabel").textContent = `${away} 安打`;
      el("homeHitsLabel").textContent = `${home} 安打`;
      el("awayErrorsLabel").textContent = `${away} 失策`;
      el("homeErrorsLabel").textContent = `${home} 失策`;

      syncEventFields();
    }

    function syncEventFields() {
      const half = value("eventHalf");

      const topVisible = ["awayRunsBox", "awayHitsBox", "homeErrorsBox"];
      const bottomVisible = ["homeRunsBox", "homeHitsBox", "awayErrorsBox"];

      if (half === "top") {
        topVisible.forEach((id) => el(id).hidden = false);
        bottomVisible.forEach((id) => el(id).hidden = true);
      } else {
        topVisible.forEach((id) => el(id).hidden = true);
        bottomVisible.forEach((id) => el(id).hidden = false);
      }
    }

    function nextStep() {
      el(`step${currentStep}`).hidden = true;
      currentStep = Math.min(3, currentStep + 1);
      el(`step${currentStep}`).hidden = false;

      syncTeamNames();
      syncEventFields();
    }

    function wrap(obj) {
      el("output").value =
        "```livejson\n" + JSON.stringify(obj, null, 2) + "\n```";
    }

    function makeMatchCommand() {
      syncTeamNames();

      wrap({
        type: "match",
        title: value("matchTitle"),
        date: value("matchDate"),
        venue: value("matchVenue"),
        round: value("matchRound"),
        awayTeam: value("awayTeam"),
        homeTeam: value("homeTeam")
      });
    }

    function makeLineupCommand() {
      const players = [];

      for (let i = 1; i <= 9; i++) {
        const name = value(`playerName${i}`).trim();
        const position = value(`playerPos${i}`);

        if (name || position) {
          players.push({
            order: String(i),
            name,
            position
          });
        }
      }

      if (!el("pitcherRow").hidden) {
        const pitcherName = value("pitcherName").trim();

        if (pitcherName) {
          players.push({
            order: "P",
            name: pitcherName,
            position: "P"
          });
        }
      }

      wrap({
        type: "lineup",
        team: value("lineupTeam"),
        players
      });
    }

    function makeEventCommand() {
      const half = value("eventHalf");

      const command = {
        type: "event",
        inning: num("eventInning"),
        half,
        awayRuns: 0,
        homeRuns: 0,
        awayHits: 0,
        homeHits: 0,
        awayErrors: 0,
        homeErrors: 0,
        final: el("finalCheck").checked,
        text: value("eventText")
      };

      if (half === "top") {
        command.awayRuns = num("awayRuns");
        command.awayHits = num("awayHits");
        command.homeErrors = num("homeErrors");
      }

      if (half === "bottom") {
        command.homeRuns = num("homeRuns");
        command.homeHits = num("homeHits");
        command.awayErrors = num("awayErrors");
      }

      wrap(command);
    }

    async function copyOutput() {
      const text = el("output").value;

      if (!text.trim()) {
        alert("先にJSONを作成してください。");
        return;
      }

      await navigator.clipboard.writeText(text);
      alert("コピーしました。Issueコメントに貼り付けてください。");
    }

    function openCurrentIssue() {
      window.open(currentIssueUrl, "_blank", "noreferrer");
    }

    function openNewGameIssue() {
      const title = encodeURIComponent("速報入力 新しい試合");
      const body = encodeURIComponent("edit.htmlで作成したJSONを、このIssueのコメントに貼り付けてください。");
      const url = `https://github.com/${REPO_OWNER}/${REPO_NAME}/issues/new?title=${title}&body=${body}`;

      window.open(url, "_blank", "noreferrer");
    }

    async function loadCurrentIssueUrl() {
      try {
        const res = await fetch("./data/current.json?ts=" + Date.now(), {
          cache: "no-store"
        });

        if (!res.ok) return;

        const data = await res.json();

        if (data.issue_url) {
          currentIssueUrl = data.issue_url + "#issuecomment-new";
        }
      } catch {
        // 読み込めなくても編集自体はできる
      }
    }

    function init() {
      fillInningSelect();

      [
        "awayRuns",
        "homeRuns",
        "awayHits",
        "homeHits",
        "awayErrors",
        "homeErrors"
      ].forEach((id) => {
        fillNumberSelect(id, 20);
      });

      buildLineupRows();
      syncTeamNames();
      syncEventFields();
      loadCurrentIssueUrl();
    }

    init();
  </script>
</body>
</html>
